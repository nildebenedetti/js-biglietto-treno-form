<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!--link di Bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
<!-- inserisco un container con relativa card -->
    <div class="container card-container p-5">
        <div class="card">
            <!-- strutturo il card header-->
            <div class="card-header">

                <h4 class="form-card-header-title">
                    PomPom Trainlines - Acquista Biglietto
                </h4>
            </div>
            <!-- entro nel card body dove ci sono un minimo di istruzioni per user + form-->
            <div class="card-body">
                <h5 class="card-title">Inserisci i dati del passeggero </h5>
                <p class="card-text">Il nostro sistema genera la soluzione di viaggio perfetta per te!</p>
                <form>
                     <div class="mb-3">
                        <label for="tratta-km" class="form-label">Nome</label>
                        <input type="text" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
                        <div id="emailHelp" class="form-text">es. Namie</div>
                    </div>
                    <div class="mb-3">
                        <label for="tratta-km" class="form-label">Cognome</label>
                        <input type="text" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
                        <div id="emailHelp" class="form-text">es. Woof</div>
                    </div>
                    <div class="mb-3">
                        <label for="tratta-km" class="form-label">Quanti km devi percorrere?</label>
                        <input type="number" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
                        <div id="emailHelp" class="form-text">Inserisci il numero esatto di km che devi percorrere.</div>
                    </div>
                    
                    <!-- LO TENGO SE MI SERVE PER DOPO
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="exampleCheck1">
                        <label class="form-check-label" for="exampleCheck1">Check me out</label>
                    </div> -->
                    <button type="submit" class="btn btn-primary">Submit</button>
                </form>
            </div>

        </div>
    </div>

    <!--script di Bootstrap-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="script/script-1.js"></script>
</body>

</html>
